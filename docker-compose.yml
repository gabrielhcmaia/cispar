name: cispar

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cispar
      POSTGRES_USER: cispar
      POSTGRES_PASSWORD: cispar_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cispar -d cispar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


volumes:
  postgres_data:
