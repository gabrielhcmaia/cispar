spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/cispar}
    username: ${SPRING_DATASOURCE_USERNAME:cispar}
    password: ${SPRING_DATASOURCE_PASSWORD:cispar_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

jwt:
  secret: cispar-local-dev-secret-key-must-be-at-least-32-chars!
