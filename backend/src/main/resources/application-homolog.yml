# Ambiente de Homologação — preencher variáveis de ambiente na hospedagem
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}           # definir na hospedagem
    username: ${SPRING_DATASOURCE_USERNAME} # definir na hospedagem
    password: ${SPRING_DATASOURCE_PASSWORD} # definir na hospedagem
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS} # definir na hospedagem (domínio homolog)
