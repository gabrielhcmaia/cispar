spring:
  application:
    name: cispar-api
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: CISPAR API
    description: Sistema de Controle de Autarquias de Água — Sarandi/PR
    version: 1.0.0-SNAPSHOT
