spring:
  application:
    name: cispar-api
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      cors:
        allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
        allowed-methods: GET,OPTIONS
        allow-credentials: true
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

info:
  app:
    name: CISPAR API
    description: Sistema de Controle de Autarquias de Água — Sarandi/PR
    version: 1.0.0-SNAPSHOT
