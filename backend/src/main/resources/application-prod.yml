# Ambiente de Produção (OCI) — preencher variáveis de ambiente na hospedagem/OCI
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}           # definir na OCI
    username: ${SPRING_DATASOURCE_USERNAME} # definir na OCI
    password: ${SPRING_DATASOURCE_PASSWORD} # definir na OCI
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS} # definir na OCI (domínio de produção — a definir)

management:
  endpoints:
    web:
      exposure:
        include: health # produção: expor apenas health
